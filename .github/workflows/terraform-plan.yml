name: Terraform Plan

on:
  pull_request:
    branches: [master]
    paths:
      - 'environments/**'
      - 'modules/**'

# OIDC login to Azure — passwordless, no stored client secret.
# Requires an Azure AD app with a federated credential + these repo secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/int
    steps:
      - uses: actions/checkout@v4

      # fmt is a repo-wide check (modules + every environment), so run it from root.
      - uses: hashicorp/setup-terraform@v3
      - name: Format check (modules + environments)
        run: terraform fmt -check -recursive
        working-directory: ${{ github.workspace }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Init
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Plan
        run: terraform plan
        env:
          ARM_USE_OIDC: 'true'
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
